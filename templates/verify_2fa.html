{% extends 'base.html' %}

{% block title %}Two-Factor Authentication{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 400px; margin: 60px auto; text-align: center;">
    <h1>Two-Factor Authentication</h1>
    <p style="color: #555; margin-bottom: 24px;">Open your authenticator app and enter the 6-digit code for <strong>VaultLock</strong>.</p>

    <form method="POST" action="{{ url_for('verify_2fa') }}">
        <label for="code">Authentication Code:</label>
        <input type="text" id="code" name="code" placeholder="000000" maxlength="6" inputmode="numeric" pattern="\d{6}" autocomplete="one-time-code" required style="letter-spacing: 4px; font-size: 1.4em; text-align: center; margin-bottom: 16px;">

        <button type="submit" style="width: 100%;">Verify</button>
    </form>

    <p style="margin-top: 20px; font-size: 0.9em;">
        <a href="{{ url_for('login') }}">← Back to login</a>
    </p>
</div>
{% endblock %}
